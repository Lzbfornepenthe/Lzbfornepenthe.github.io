name: 自动部署 Hexo 到 GitHub Pages

on:
  push:
    branches: [ hexo-source ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          ref: hexo-source
          submodules: 'recursive'

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          npm ci

      - name: 生成静态文件
        run: |
          npx hexo clean
          npx hexo generate

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.HEXO_DEPLOY_KEY }}
          publish_dir: ./public
          publish_branch: main
          commit_message: '自动化部署: 源自 ${{ github.event.head_commit.message }}'