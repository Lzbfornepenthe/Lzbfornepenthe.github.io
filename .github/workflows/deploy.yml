name: 最终部署

on:
  push:
    branches: [ hexo-source ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci

      - name: 生成静态文件
        run: |
          npx hexo clean
          npx hexo generate

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.HEXO_FINAL_DEPLOY_KEY }}  # 使用新配置的 SSH 密钥
          publish_dir: ./public
          publish_branch: main
          commit_message: '自动部署：${{ github.event.head_commit.message }}'